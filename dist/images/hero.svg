<svg width="1400" height="700" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e1b4b" />
            <stop offset="100%" stop-color="#0f172a" />
        </linearGradient>
        <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.3" />
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg)" />
    <!-- Abstract shapes -->
    <path d="M-100,-100 Q400,300 900,-50 T1500,200 L1500,-100 Z" fill="url(#glow)" />
    <circle cx="20%" cy="70%" r="300" fill="#38bdf8" opacity="0.1" />
    <circle cx="80%" cy="30%" r="400" fill="#818cf8" opacity="0.1" />
    <!-- Grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <rect width="100%" height="100%" fill="url(#grid)" />
    <text x="50%" y="50%" font-family="monospace" font-size="40" font-weight="bold" fill="rgba(255,255,255,0.2)" text-anchor="middle" dominant-baseline="middle">HERO BANNER</text>
</svg>
