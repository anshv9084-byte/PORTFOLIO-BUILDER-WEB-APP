<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0f2922" />
            <stop offset="100%" stop-color="#134e4a" />
        </linearGradient>
    </defs>
    <rect width="100%" height="100%" fill="url(#bg3)" />
    <!-- Network/graph shapes -->
    <circle cx="450" cy="250" r="15" fill="#10b981" />
    <circle cx="250" cy="150" r="25" fill="#14b8a6" />
    <circle cx="650" cy="100" r="20" fill="#06b6d4" />
    <circle cx="300" cy="400" r="30" fill="#6ee7b7" opacity="0.5"/>
    <circle cx="700" cy="350" r="35" fill="#2dd4bf" opacity="0.5"/>
    <circle cx="100" cy="300" r="15" fill="#99f6e4" />
    <circle cx="800" cy="200" r="20" fill="#5eead4" />
    
    <!-- Lines connecting -->
    <line x1="450" y1="250" x2="250" y2="150" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="450" y1="250" x2="650" y2="100" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="450" y1="250" x2="300" y2="400" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="450" y1="250" x2="700" y2="350" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="250" y1="150" x2="100" y2="300" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="650" y1="100" x2="800" y2="200" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    <line x1="700" y1="350" x2="800" y2="200" stroke="#10b981" stroke-width="2" opacity="0.5"/>
    
    <!-- Code block overlay -->
    <rect x="350" y="320" width="200" height="120" rx="8" fill="#022c22" opacity="0.8"/>
    <rect x="370" y="340" width="100" height="8" rx="4" fill="#34d399"/>
    <rect x="370" y="360" width="140" height="8" rx="4" fill="#6ee7b7"/>
    <rect x="370" y="380" width="80" height="8" rx="4" fill="#6ee7b7"/>
    <rect x="370" y="400" width="120" height="8" rx="4" fill="#34d399"/>
</svg>
