<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | AI Portfolio Pro</title>
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&f[]=general-sans@400,500,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-[#0A0A0F] text-white font-general min-h-screen flex items-center justify-center p-6 overflow-x-hidden">

    <!-- Animated Canvas Background -->
    <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;"></canvas>

    <div class="w-full max-w-md animate-fade-in relative z-10">
        <div class="text-center mb-8">
            <div class="w-12 h-12 bg-accent rounded-xl flex items-center justify-center text-black font-bold mx-auto mb-4 text-xl shadow-lg shadow-accent/20">AI</div>
            <h1 class="text-3xl font-clash font-bold">Welcome back</h1>
            <p class="text-white/50 mt-2">Sign in to manage your portfolios.</p>
        </div>

        <div class="bg-[#0D0D14]/80 backdrop-blur-xl p-8 rounded-3xl border border-white/10">
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-2 text-white/40">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" class="form-input bg-white/5 border-white/10 text-white" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider mb-2 text-white/40">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="form-input bg-white/5 border-white/10 text-white" required>
                </div>
                <button type="submit" class="w-full bg-accent text-black py-4 rounded-xl font-bold hover:scale-[1.02] transition-transform shadow-lg shadow-accent/20">
                    Sign In
                </button>
            </form>
            
            <div class="mt-6 text-center space-y-4">
                <p class="text-sm text-white/40">
                    Don't have an account? 
                    <a href="signup.html" class="text-accent font-semibold hover:underline">Sign up</a>
                </p>
                
                <div class="pt-6 border-t border-white/5">
                    <button id="guest-btn" class="w-full py-3 bg-white/5 rounded-xl text-xs font-bold uppercase tracking-widest text-accent hover:bg-white/10 transition-all border border-white/10">
                        Skip to Dashboard (Developer Mode)
                    </button>
                    <p class="text-[10px] text-slate-400 mt-2 italic">Use this if you see "Email rate limit exceeded"</p>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { initBackground } from './bg-animation.js';
        initBackground();
    </script>
    <script type="module" src="./login.js"></script>
</body>
</html>
